<!DOCTYPE html><html lang="fr"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>LAYLA Scan</title><style>body{font-family:Inter,system-ui,sans-serif;background:#050505;color:#f7f0e6;padding:24px}h1{color:#d8ad55}input,button{width:100%;max-width:520px;margin:8px 0;padding:14px;border-radius:14px;border:1px solid rgba(216,173,85,.35);background:#111;color:#fff}button{background:#d8ad55;color:#140e08;font-weight:900}.box{margin-top:18px;padding:18px;border-radius:18px;border:1px solid rgba(216,173,85,.28);max-width:520px}.ok{color:#78ff9b}.bad{color:#ff7777}</style></head><body><h1>LAYLA NIGHTS — Scan entrée</h1><input id="pwd" type="password" placeholder="Admin password"><input id="ref" placeholder="Référence QR ex: LAYLA-ABC123" autofocus><button onclick="scan()">Valider l’entrée</button><div id="result" class="box"></div><script>
async function scan(){result.textContent='Validation...';const r=await fetch('/api/scan',{method:'POST',headers:{'Content-Type':'application/json','x-admin-password':pwd.value},body:JSON.stringify({reference:ref.value})});const j=await r.json();if(!r.ok){result.innerHTML=`<h2 class="bad">Refusé</h2><p>${j.error||'Erreur'}</p>${j.guest?`<p>${j.guest.fullName} · ${j.guest.passType}</p>`:''}`;return}result.innerHTML=`<h2 class="ok">Validé</h2><p>${j.guest.fullName}</p><p>${j.guest.passType} · ${j.guest.guests} personne(s)</p><p>${j.guest.reference}</p>`;ref.value='';ref.focus()}
</script></body></html>
