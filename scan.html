<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>LAYLA Scan</title>

  <script src="https://unpkg.com/html5-qrcode"></script>

  <style>
    body {
      font-family: Inter, system-ui;
      background: #050505;
      color: #f7f0e6;
      padding: 24px;
      text-align: center;
    }

    h1 { color: #d8ad55 }

    input, button {
      width: 100%;
      max-width: 520px;
      margin: 8px auto;
      padding: 14px;
      border-radius: 14px;
      border: 1px solid rgba(216,173,85,.35);
      background: #111;
      color: #fff;
      display: block;
    }

    button {
      background: #d8ad55;
      color: #140e08;
      font-weight: 900;
      cursor: pointer;
    }

    #reader {
      max-width: 520px;
      margin: 20px auto;
      border-radius: 18px;
      overflow: hidden;
    }

    #result {
      margin-top: 20px;
      padding: 20px;
      border-radius: 18px;
      font-size: 18px;
    }

    .ok {
      background: #0f2e1a;
      color: #78ff9b;
    }

    .bad {
      background: #2e0f0f;
      color: #ff7777;
    }
  </style>
</head>

<body>

<h1>LAYLA NIGHTS — Scan entrée</h1>

<input id="pwd" type="password" placeholder="Admin password" />
<button onclick="startCamera()">Démarrer la caméra</button>

<div id="reader"></div>

<input id="ref" placeholder="Référence QR ex: LAYLA-ABC123" />
<button onclick="validateEntry(ref.value)">Valider manuellement</button>

<div id="result">En attente du scan...</div>

<script>
let scannerInstance = null;
let isProcessing = false;

// 🔊 son
function beep(success = true) {
  const audio = new Audio(success 
    ? "https://actions.google.com/sounds/v1/cartoon/clang_and_wobble.ogg"
    : "https://actions.google.com/sounds/v1/alarms/beep_short.ogg"
  );
  audio.play();
}

async function validateEntry(reference) {
  if (!reference) return;

  result.innerText = "Validation...";

  try {
    const r = await fetch('/api/scan', {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        'x-admin-password': pwd.value
      },
      body: JSON.stringify({ reference })
    });

    const j = await r.json();

    if (!r.ok) {
      result.className = "bad";
      result.innerHTML = `<h2>❌ Refusé</h2><p>${j.error}</p>`;
      beep(false);
      return;
    }

    result.className = "ok";
    result.innerHTML = `
      <h2>✅ Validé</h2>
      <p>${j.guest.fullName}</p>
      <p>${j.guest.passType} · ${j.guest.guests} personne(s)</p>
    `;

    beep(true);

  } catch (e) {
    result.className = "bad";
    result.innerHTML = `<h2>Erreur</h2><p>${e.message}</p>`;
    beep(false);
  }
}

function extractReference(text) {
  try {
    const url = new URL(text);
    return url.searchParams.get('ref') || text;
  } catch {
    return text;
  }
}

function onScanSuccess(decodedText) {
  if (isProcessing) return;

  isProcessing = true;

  const refValue = extractReference(decodedText);
  ref.value = refValue;

  validateEntry(refValue);

  // stop caméra après scan
  if (scannerInstance) {
    scannerInstance.clear();
  }

  // reset après 4 sec
  setTimeout(() => {
    isProcessing = false;
  }, 4000);
}

function startCamera() {
  if (scannerInstance) return;

  scannerInstance = new Html5QrcodeScanner("reader", {
    fps: 10,
    qrbox: 250
  });

  scannerInstance.render(onScanSuccess);
}
</script>

</body>
</html>
