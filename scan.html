<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>LAYLA Scan</title>

  <script src="https://unpkg.com/html5-qrcode"></script>

  <style>
    body {
      margin: 0;
      padding: 24px;
      font-family: Inter, system-ui, Arial, sans-serif;
      background: #050505;
      color: #f7f0e6;
      text-align: center;
    }

    h1 {
      color: #d8ad55;
      font-size: 34px;
      line-height: 1.1;
      margin: 40px 0 24px;
    }

    .wrap {
      max-width: 520px;
      margin: auto;
    }

    input, button {
      width: 100%;
      padding: 16px;
      margin: 8px 0;
      border-radius: 16px;
      border: 1px solid rgba(216,173,85,.35);
      font-size: 16px;
      box-sizing: border-box;
    }

    input {
      background: #111;
      color: #fff;
    }

    button {
      background: linear-gradient(135deg, #d8ad55, #ffbf6b);
      color: #140e08;
      font-weight: 900;
      cursor: pointer;
      border: none;
    }

    #reader {
      margin-top: 18px;
      border-radius: 18px;
      overflow: hidden;
    }

    #result {
      margin-top: 18px;
      padding: 22px;
      border-radius: 22px;
      font-size: 18px;
      min-height: 80px;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-direction: column;
    }

    .neutral {
      background: rgba(255,255,255,.05);
      border: 1px solid rgba(216,173,85,.25);
      color: #b9aa98;
    }

    .ok {
      background: #0f2e1a;
      color: #78ff9b;
    }

    .bad {
      background: #351012;
      color: #ff7777;
    }

    .small {
      font-size: 13px;
      opacity: .75;
      margin-top: 8px;
    }
  </style>
</head>

<body>
  <div class="wrap">
    <h1>LAYLA NIGHTS<br>Scan entrée</h1>

    <button onclick="startCamera()">Scanner avec caméra</button>

    <div id="reader"></div>

    <input id="ref" placeholder="Ou entrer la référence manuellement" />
    <button onclick="validateEntry(ref.value)">Valider</button>

    <div id="result" class="neutral">
      En attente du scan
    </div>
  </div>

  <script>
    const ADMIN_PASSWORD = "Ksgc9122";

    let scanner = null;
    let locked = false;

    function show(type, title, text = "") {
      result.className = type;
      result.innerHTML = `
        <h2>${title}</h2>
        ${text ? `<p>${text}</p>` : ""}
      `;
    }

    function extractReference(value) {
      value = String(value || "").trim();

      try {
        const url = new URL(value);
        return url.searchParams.get("ref") || value;
      } catch {
        return value;
      }
    }

    async function validateEntry(value) {
      const reference = extractReference(value);

      if (!reference) {
        show("bad", "❌ Référence vide", "Scanne un QR ou entre une référence.");
        return;
      }

      show("neutral", "Validation...", reference);

      try {
        const response = await fetch("/api/scan", {
          method: "POST",
          headers: {
            "Content-Type": "application/json",
            "x-admin-password": ADMIN_PASSWORD
          },
          body: JSON.stringify({ reference })
        });

        const data = await response.json();

        if (!response.ok) {
          show("bad", "❌ Refusé", data.error || "Ticket invalide");
          return;
        }

        show(
          "ok",
          "✅ Entrée validée",
          `${data.guest.fullName}<br>${data.guest.passType} · ${data.guest.guests} personne(s)<br><span class="small">${data.guest.reference}</span>`
        );

        ref.value = "";

      } catch (error) {
        show("bad", "❌ Erreur serveur", "Réessaie dans quelques secondes.");
      }
    }

    function onScanSuccess(decodedText) {
      if (locked) return;

      locked = true;

      const reference = extractReference(decodedText);
      ref.value = reference;

      validateEntry(reference);

      if (scanner) {
        scanner.clear();
        scanner = null;
      }

      setTimeout(() => {
        locked = false;
      }, 3000);
    }

    function startCamera() {
      if (scanner) return;

      show("neutral", "Caméra ouverte", "Scanne le QR ticket.");

      scanner = new Html5QrcodeScanner("reader", {
        fps: 10,
        qrbox: 250
      });

      scanner.render(onScanSuccess);
    }
  </script>
</body>
</html>
