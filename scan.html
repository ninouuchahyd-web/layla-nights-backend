<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>LAYLA Scan</title>

  <script src="https://unpkg.com/html5-qrcode"></script>

  <style>
    :root {
      --bg: #050505;
      --card: rgba(18, 15, 12, 0.78);
      --gold: #d8ad55;
      --amber: #ffbf6b;
      --text: #f7f0e6;
      --muted: #b9aa98;
      --border: rgba(216, 173, 85, 0.32);
      --green-bg: rgba(20, 80, 42, 0.45);
      --green: #7dff9d;
      --red-bg: rgba(90, 18, 22, 0.55);
      --red: #ff7777;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      min-height: 100vh;
      padding: 24px;
      font-family: Inter, system-ui, Arial, sans-serif;
      background:
        radial-gradient(circle at 20% 10%, rgba(216, 173, 85, 0.12), transparent 35%),
        radial-gradient(circle at 80% 90%, rgba(255, 191, 107, 0.10), transparent 35%),
        linear-gradient(180deg, #090807, #050505 55%, #000);
      color: var(--text);
      text-align: center;
      overflow-x: hidden;
    }

    body::before {
      content: "";
      position: fixed;
      inset: 0;
      pointer-events: none;
      background-image: radial-gradient(rgba(255,255,255,.08) 1px, transparent 1px);
      background-size: 4px 4px;
      opacity: .10;
      z-index: 0;
    }

    .wrap {
      position: relative;
      z-index: 1;
      max-width: 560px;
      margin: 0 auto;
      min-height: calc(100vh - 48px);
      display: flex;
      flex-direction: column;
      justify-content: center;
    }

    .scan-card {
      border: 1px solid var(--border);
      border-radius: 34px;
      padding: 28px;
      background: var(--card);
      backdrop-filter: blur(18px);
      box-shadow:
        0 30px 100px rgba(0, 0, 0, 0.55),
        0 0 60px rgba(216, 173, 85, 0.08);
    }

    .brand {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      padding: 9px 14px;
      border: 1px solid var(--border);
      border-radius: 999px;
      color: var(--gold);
      font-size: 12px;
      font-weight: 900;
      letter-spacing: .22em;
      text-transform: uppercase;
      background: rgba(255,255,255,.035);
      margin-bottom: 18px;
    }

    h1 {
      color: var(--text);
      font-size: clamp(34px, 8vw, 58px);
      line-height: .92;
      letter-spacing: .08em;
      text-transform: uppercase;
      margin-bottom: 12px;
      text-shadow: 0 0 34px rgba(255, 191, 107, 0.16);
    }

    .subtitle {
      color: var(--muted);
      line-height: 1.7;
      font-size: 15px;
      margin-bottom: 26px;
    }

    .btn-row {
      display: grid;
      gap: 12px;
    }

    input,
    button {
      width: 100%;
      padding: 16px 18px;
      border-radius: 18px;
      font-size: 16px;
      font-family: inherit;
      box-sizing: border-box;
      outline: none;
    }

    input {
      border: 1px solid var(--border);
      background: rgba(255,255,255,.045);
      color: #fff;
      transition: .25s ease;
    }

    input::placeholder {
      color: rgba(247, 240, 230, 0.45);
    }

    input:focus {
      border-color: rgba(255, 191, 107, 0.75);
      box-shadow: 0 0 0 4px rgba(255, 191, 107, 0.08);
    }

    button {
      border: none;
      background: linear-gradient(135deg, var(--gold), var(--amber));
      color: #140e08;
      font-weight: 950;
      cursor: pointer;
      transition: .25s ease;
      box-shadow: 0 14px 36px rgba(216, 173, 85, 0.20);
    }

    button:hover {
      transform: translateY(-2px);
      box-shadow: 0 18px 48px rgba(216, 173, 85, 0.28);
    }

    button:active {
      transform: scale(.98);
    }

    .manual-box {
      margin-top: 18px;
      padding-top: 18px;
      border-top: 1px solid rgba(216, 173, 85, 0.18);
      display: grid;
      gap: 10px;
    }

    .manual-label {
      color: var(--muted);
      font-size: 13px;
      text-align: left;
      letter-spacing: .06em;
      text-transform: uppercase;
    }

    #reader {
      margin-top: 18px;
      border-radius: 24px;
      overflow: hidden;
      border: 1px solid rgba(216, 173, 85, 0.35);
      background: rgba(0,0,0,.35);
      box-shadow: inset 0 0 40px rgba(255, 191, 107, 0.04);
    }

    #reader:empty {
      display: none;
    }

    #reader video {
      border-radius: 22px;
    }

    #reader button {
      margin: 8px auto !important;
      width: auto !important;
      padding: 11px 16px !important;
      border-radius: 999px !important;
      font-size: 13px !important;
    }

    #reader select {
      border-radius: 14px !important;
      padding: 10px !important;
      background: #111 !important;
      color: #fff !important;
      border: 1px solid var(--border) !important;
      margin: 8px 0 !important;
    }

    #result {
      margin-top: 20px;
      padding: 22px;
      border-radius: 26px;
      font-size: 17px;
      min-height: 110px;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-direction: column;
    }

    #result h2 {
      font-size: 24px;
      margin-bottom: 8px;
    }

    #result p {
      line-height: 1.6;
    }

    .neutral {
      background: rgba(255,255,255,.045);
      border: 1px solid rgba(216,173,85,.25);
      color: var(--muted);
    }

    .ok {
      background: var(--green-bg);
      border: 1px solid rgba(125,255,157,.35);
      color: var(--green);
      box-shadow: 0 0 44px rgba(125,255,157,.10);
    }

    .bad {
      background: var(--red-bg);
      border: 1px solid rgba(255,119,119,.35);
      color: var(--red);
      box-shadow: 0 0 44px rgba(255,119,119,.10);
    }

    .small {
      display: inline-block;
      font-size: 13px;
      opacity: .75;
      margin-top: 8px;
      color: inherit;
    }

    .footer-note {
      margin-top: 18px;
      color: rgba(185,170,152,.72);
      font-size: 12px;
      letter-spacing: .12em;
      text-transform: uppercase;
    }

    @media (max-width: 520px) {
      body {
        padding: 16px;
      }

      .wrap {
        min-height: calc(100vh - 32px);
      }

      .scan-card {
        padding: 22px;
        border-radius: 28px;
      }

      h1 {
        font-size: 40px;
      }

      #result {
        min-height: 96px;
      }
    }
  </style>
</head>

<body>
  <div class="wrap">
    <div class="scan-card">
      <div class="brand">LAYLA NIGHTS</div>

      <h1>Scan<br>Entrée</h1>

      <p class="subtitle">
        Scanne le QR code du ticket ou entre la référence manuellement pour valider l’accès.
      </p>

      <div class="btn-row">
        <button onclick="startCamera()">Scanner avec caméra</button>
      </div>

      <div id="reader"></div>

      <div class="manual-box">
        <div class="manual-label">Validation manuelle</div>
        <input id="ref" placeholder="Ex: LAYLA-ABC123" />
        <button onclick="validateEntry(ref.value)">Valider l’entrée</button>
      </div>

      <div id="result" class="neutral">
        En attente du scan
      </div>

      <div class="footer-note">
        Private access · QR validation · Club mode
      </div>
    </div>
  </div>

  <script>
    const ADMIN_PASSWORD = "Ksgc9122";

    let scanner = null;
    let locked = false;

    function show(type, title, text = "") {
      result.className = type;
      result.innerHTML = `
        <h2>${title}</h2>
        ${text ? `<p>${text}</p>` : ""}
      `;
    }

    function extractReference(value) {
      value = String(value || "").trim();

      try {
        const url = new URL(value);
        return url.searchParams.get("ref") || value;
      } catch {
        return value;
      }
    }

    async function validateEntry(value) {
      const reference = extractReference(value);

      if (!reference) {
        show("bad", "❌ Référence vide", "Scanne un QR ou entre une référence.");
        return;
      }

      show("neutral", "Validation...", reference);

      try {
        const response = await fetch("/api/scan", {
          method: "POST",
          headers: {
            "Content-Type": "application/json",
            "x-admin-password": ADMIN_PASSWORD
          },
          body: JSON.stringify({ reference })
        });

        const data = await response.json();

        if (!response.ok) {
          show("bad", "❌ Refusé", data.error || "Ticket invalide");
          return;
        }

        show(
          "ok",
          "✅ Entrée validée",
          `${data.guest.fullName}<br>${data.guest.passType} · ${data.guest.guests} personne(s)<br><span class="small">${data.guest.reference}</span>`
        );

        ref.value = "";

      } catch (error) {
        show("bad", "❌ Erreur serveur", "Réessaie dans quelques secondes.");
      }
    }

    function onScanSuccess(decodedText) {
      if (locked) return;

      locked = true;

      const reference = extractReference(decodedText);
      ref.value = reference;

      validateEntry(reference);

      if (scanner) {
        scanner.clear();
        scanner = null;
      }

      setTimeout(() => {
        locked = false;
      }, 3000);
    }

    function startCamera() {
      if (scanner) return;

      show("neutral", "Caméra ouverte", "Scanne le QR ticket.");

      scanner = new Html5QrcodeScanner("reader", {
        fps: 10,
        qrbox: 250
      });

      scanner.render(onScanSuccess);
    }
  </script>
</body>
</html>
