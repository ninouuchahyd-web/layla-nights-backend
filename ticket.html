<!DOCTYPE html><html lang="fr"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>LAYLA Ticket</title><script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script><style>body{min-height:100vh;margin:0;display:flex;align-items:center;justify-content:center;font-family:Inter,system-ui,sans-serif;background:linear-gradient(rgba(0,0,0,.72),rgba(0,0,0,.9)),url('hero.png') center/cover;color:#f7f0e6;padding:20px}.card{max-width:420px;width:100%;text-align:center;border:1px solid rgba(216,173,85,.35);background:rgba(5,5,5,.78);backdrop-filter:blur(12px);border-radius:28px;padding:28px}h1{color:#d8ad55;letter-spacing:.12em}#qrcode{display:flex;justify-content:center;background:#fff;padding:18px;border-radius:18px;margin:22px auto;width:max-content}.muted{color:#b9aa98}</style></head><body><div class="card"><h1>LAYLA NIGHTS</h1><div id="content">Chargement...</div><div id="qrcode"></div><p class="muted">Présentez ce QR code à l’entrée.</p></div><script>
const ref=new URLSearchParams(location.search).get('ref');async function load(){if(!ref){content.textContent='Référence manquante.';return}const r=await fetch('/api/ticket/'+encodeURIComponent(ref));const j=await r.json();if(!r.ok){content.textContent=j.error||'Invitation introuvable.';return}content.innerHTML=`<h2>${j.guest.fullName}</h2><p>${j.guest.passType} · ${j.guest.guests} personne(s)</p><p><b>${j.guest.reference}</b></p><p>${j.guest.used?'Déjà utilisé':'Valide'}</p>`;new QRCode(document.getElementById('qrcode'),{text:j.guest.reference,width:220,height:220});}load();
</script></body></html>
