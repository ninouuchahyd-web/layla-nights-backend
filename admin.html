<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>LAYLA Admin</title>

  <style>
    :root {
      --bg:#050505;
      --card:rgba(20,18,16,.76);
      --gold:#d8ad55;
      --amber:#ffbf6b;
      --text:#f7f0e6;
      --muted:#b9aa98;
      --border:rgba(216,173,85,.30);
      --green:#78ff9b;
      --red:#ff7777;
      --grey:#9d9d9d;
    }

    * {
      box-sizing:border-box;
      margin:0;
      padding:0;
    }

    body {
      min-height:100vh;
      font-family:Inter,system-ui,Arial,sans-serif;
      background:
        radial-gradient(circle at 15% 10%, rgba(216,173,85,.13), transparent 34%),
        radial-gradient(circle at 85% 90%, rgba(255,191,107,.10), transparent 38%),
        linear-gradient(180deg,#090807,#050505 55%,#000);
      color:var(--text);
      padding:24px;
      overflow-x:hidden;
    }

    body:before {
      content:"";
      position:fixed;
      inset:0;
      pointer-events:none;
      background-image:radial-gradient(rgba(255,255,255,.08) 1px,transparent 1px);
      background-size:4px 4px;
      opacity:.10;
      z-index:0;
    }

    .page {
      position:relative;
      z-index:1;
      max-width:1120px;
      margin:0 auto;
    }

    .top {
      display:flex;
      justify-content:space-between;
      align-items:flex-start;
      gap:20px;
      margin-bottom:28px;
      padding:26px;
      border:1px solid var(--border);
      border-radius:30px;
      background:rgba(20,18,16,.70);
      backdrop-filter:blur(18px);
      box-shadow:0 30px 100px rgba(0,0,0,.42);
    }

    .brand {
      display:inline-flex;
      padding:8px 14px;
      border-radius:999px;
      border:1px solid var(--border);
      color:var(--gold);
      font-size:12px;
      font-weight:900;
      letter-spacing:.22em;
      text-transform:uppercase;
      margin-bottom:16px;
      background:rgba(255,255,255,.035);
    }

    h1 {
      color:var(--text);
      font-size:clamp(34px,6vw,64px);
      line-height:.92;
      letter-spacing:.07em;
      text-transform:uppercase;
      text-shadow:0 0 34px rgba(255,191,107,.15);
      margin-bottom:14px;
    }

    .muted {
      color:var(--muted);
      line-height:1.7;
    }

    .login-box {
      min-width:320px;
      display:grid;
      gap:10px;
      padding:18px;
      border-radius:24px;
      border:1px solid rgba(216,173,85,.22);
      background:rgba(255,255,255,.035);
    }

    input,
    button {
      width:100%;
      padding:14px 16px;
      border-radius:16px;
      font-family:inherit;
      font-size:15px;
      outline:none;
    }

    input {
      border:1px solid var(--border);
      background:rgba(0,0,0,.36);
      color:#fff;
      transition:.25s ease;
    }

    input::placeholder {
      color:rgba(247,240,230,.45);
    }

    input:focus {
      border-color:rgba(255,191,107,.75);
      box-shadow:0 0 0 4px rgba(255,191,107,.08);
    }

    button,
    .btnlink {
      border:none;
      cursor:pointer;
      background:linear-gradient(135deg,var(--gold),var(--amber));
      color:#140e08;
      font-weight:950;
      text-decoration:none;
      text-align:center;
      transition:.25s ease;
      box-shadow:0 12px 32px rgba(216,173,85,.18);
    }

    button:hover,
    .btnlink:hover {
      transform:translateY(-2px);
      box-shadow:0 18px 48px rgba(216,173,85,.27);
    }

    .reject {
      background:rgba(255,255,255,.07);
      color:var(--text);
      border:1px solid rgba(255,255,255,.12);
      box-shadow:none;
    }

    .reject:hover {
      box-shadow:0 18px 48px rgba(255,255,255,.05);
    }

    .danger {
      color:var(--red);
      border-color:rgba(255,119,119,.28);
    }

    .row {
      display:grid;
      grid-template-columns:repeat(2,1fr);
      gap:16px;
      margin-top:20px;
    }

    .card {
      border:1px solid var(--border);
      background:var(--card);
      border-radius:26px;
      padding:20px;
      backdrop-filter:blur(16px);
      box-shadow:0 24px 80px rgba(0,0,0,.28);
      transition:.25s ease;
    }

    .card:hover {
      transform:translateY(-4px);
      box-shadow:0 28px 100px rgba(255,191,107,.10);
    }

    .card-head {
      display:flex;
      justify-content:space-between;
      align-items:flex-start;
      gap:12px;
      margin-bottom:12px;
    }

    .card h3 {
      font-size:22px;
      line-height:1.25;
      color:var(--text);
    }

    .pass {
      color:var(--gold);
      font-weight:900;
      margin-top:4px;
      font-size:14px;
    }

    .badge {
      padding:7px 11px;
      border-radius:999px;
      font-size:11px;
      font-weight:950;
      text-transform:uppercase;
      letter-spacing:.10em;
      white-space:nowrap;
      border:1px solid rgba(255,255,255,.12);
    }

    .badge.pending {
      color:var(--amber);
      background:rgba(255,191,107,.10);
      border-color:rgba(255,191,107,.28);
    }

    .badge.approved {
      color:var(--green);
      background:rgba(120,255,155,.10);
      border-color:rgba(120,255,155,.28);
    }

    .badge.rejected {
      color:var(--red);
      background:rgba(255,119,119,.10);
      border-color:rgba(255,119,119,.28);
    }

    .meta {
      display:grid;
      gap:6px;
      margin:14px 0;
      color:var(--muted);
      line-height:1.5;
      font-size:14px;
    }

    .message {
      margin-top:12px;
      padding:14px;
      border-radius:18px;
      background:rgba(255,255,255,.035);
      border:1px solid rgba(255,255,255,.08);
      color:var(--muted);
      min-height:48px;
      line-height:1.6;
    }

    .actions {
      display:grid;
      grid-template-columns:repeat(3,1fr);
      gap:10px;
      margin-top:14px;
    }

    .links {
      display:grid;
      grid-template-columns:repeat(2,1fr);
      gap:10px;
      margin-top:10px;
    }

    .btnlink {
      padding:14px 16px;
      border-radius:16px;
      display:flex;
      align-items:center;
      justify-content:center;
      font-size:14px;
    }

    .empty,
    .error-box,
    .loading {
      grid-column:1/-1;
      padding:24px;
      border:1px solid var(--border);
      border-radius:24px;
      background:rgba(255,255,255,.04);
      color:var(--muted);
      text-align:center;
    }

    .error-box {
      color:var(--red);
      border-color:rgba(255,119,119,.28);
      background:rgba(255,119,119,.07);
    }

    @media(max-width:900px) {
      .top {
        flex-direction:column;
      }

      .login-box {
        width:100%;
        min-width:0;
      }

      .row {
        grid-template-columns:1fr;
      }
    }

    @media(max-width:520px) {
      body {
        padding:14px;
      }

      .top {
        padding:20px;
        border-radius:24px;
      }

      .card {
        padding:18px;
        border-radius:22px;
      }

      .actions,
      .links {
        grid-template-columns:1fr;
      }

      h1 {
        font-size:38px;
      }
    }
  </style>
</head>

<body>
  <div class="page">
    <div class="top">
      <div>
        <div class="brand">LAYLA NIGHTS</div>
        <h1>Guest<br>Dashboard</h1>
        <p class="muted">
          Entrez le mot de passe admin pour voir, approuver et gérer les demandes d’accès.
        </p>
      </div>

      <div class="login-box">
        <input id="pwd" type="password" placeholder="Admin password" />
        <button onclick="loadGuests()">Charger les demandes</button>
      </div>
    </div>

    <div id="list" class="row"></div>
  </div>

  <script>
    async function api(path, opts = {}) {
      opts.headers = {
        ...(opts.headers || {}),
        'Content-Type': 'application/json',
        'x-admin-password': document.getElementById('pwd').value
      };

      const r = await fetch(path, opts);
      const j = await r.json();

      if (!r.ok) {
        throw new Error(j.error || 'Erreur');
      }

      return j;
    }

    async function setStatus(ref, status) {
      await api('/api/guests/' + ref + '/status', {
        method: 'POST',
        body: JSON.stringify({ status })
      });

      loadGuests();
    }

    function wa(phone, text) {
      const clean = String(phone || '').replace(/\D/g, '');
      return 'https://wa.me/' + clean + '?text=' + encodeURIComponent(text);
    }

    function esc(value) {
      return String(value || '')
        .replaceAll('&', '&amp;')
        .replaceAll('<', '&lt;')
        .replaceAll('>', '&gt;')
        .replaceAll('"', '&quot;')
        .replaceAll("'", '&#039;');
    }

    async function loadGuests() {
      const list = document.getElementById('list');
      list.innerHTML = '<div class="loading">Chargement des demandes...</div>';

      try {
        const data = await api('/api/guests');
        const guests = data.guests || [];

        if (!guests.length) {
          list.innerHTML = '<div class="empty">Aucune demande pour le moment.</div>';
          return;
        }

        list.innerHTML = guests.map(g => {
          const ticketUrl = location.origin + '/ticket.html?ref=' + encodeURIComponent(g.reference);

          const msg = g.status === 'approved'
            ? 'Votre accès LAYLA NIGHTS est confirmé. Invitation: ' + ticketUrl
            : 'Hello ' + g.fullName + ', concernant votre demande LAYLA NIGHTS.';

          const statusClass = ['approved', 'rejected', 'pending'].includes(g.status)
            ? g.status
            : 'pending';

          return `
            <div class="card">
              <div class="card-head">
                <div>
                  <h3>${esc(g.fullName)}</h3>
                  <div class="pass">${esc(g.passType)}</div>
                </div>
                <span class="badge ${statusClass}">${esc(g.status)}</span>
              </div>

              <div class="meta">
                <div><b>Reference:</b> ${esc(g.reference)}</div>
                <div><b>Guests:</b> ${esc(g.guests)} personne(s)</div>
                <div><b>Phone:</b> ${esc(g.phone || '-')}</div>
                <div><b>Instagram:</b> ${esc(g.instagram || '-')}</div>
                <div><b>Promo:</b> ${esc(g.promoCode || '-')} ${g.promoDj ? '· ' + esc(g.promoDj) : ''}</div>
              </div>

              <div class="message">
                ${esc(g.message || 'Aucun message.')}
              </div>

              <div class="actions">
                <button onclick="setStatus('${esc(g.reference)}','approved')">Approve</button>
                <button class="reject danger" onclick="setStatus('${esc(g.reference)}','rejected')">Reject</button>
                <button class="reject" onclick="setStatus('${esc(g.reference)}','pending')">Pending</button>
              </div>

              <div class="links">
                <a class="btnlink" target="_blank" href="${wa(g.phone, msg)}">WhatsApp</a>
                <a class="btnlink" target="_blank" href="${ticketUrl}">Ticket QR</a>
              </div>
            </div>
          `;
        }).join('');

      } catch (e) {
        list.innerHTML = '<div class="error-box">' + esc(e.message) + '</div>';
      }
    }
  </script>
</body>
</html>
