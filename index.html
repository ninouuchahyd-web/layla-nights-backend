<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LAYLA NIGHTS</title>

<style>
:root{
  --bg:#050505;
  --gold:#d8ad55;
  --amber:#ffbf6b;
  --text:#f7f0e6;
  --muted:#b9aa98;
  --border:rgba(255,191,107,.25);
}

*{margin:0;padding:0;box-sizing:border-box}

body{
  font-family:Inter,system-ui;
  background:#050505;
  color:var(--text);
}

/* 🌫️ atmosphere */
body::after{
  content:"";
  position:fixed;
  inset:0;
  background:radial-gradient(circle at 70% 80%, rgba(255,191,107,0.08), transparent 60%);
  pointer-events:none;
}

/* 🎭 HERO */
.hero{
  min-height:100vh;
  display:flex;
  align-items:center;
  justify-content:center;
  text-align:center;
  position:relative;

  background:
    linear-gradient(to bottom, rgba(0,0,0,.6), rgba(0,0,0,.9)),
    url("https://images.unsplash.com/photo-1507525428034-b723cf961d3e") center/cover no-repeat;
}

.hero::after{
  content:"";
  position:absolute;
  inset:0;
  background:radial-gradient(circle at 50% 30%, rgba(255,191,107,.25), transparent 60%);
}

/* 🧠 content */
.hero-content{
  position:relative;
  z-index:2;
}

h1{
  font-size:clamp(60px,10vw,120px);
  letter-spacing:.1em;
}

.subtitle{
  margin-top:20px;
  color:var(--muted);
}

.date{
  margin-top:20px;
  display:inline-block;
  padding:10px 20px;
  border:1px solid var(--border);
  border-radius:999px;
  color:var(--amber);
}

/* 🎇 BUTTON */
.btn{
  margin-top:20px;
  padding:15px 25px;
  border-radius:999px;
  border:none;
  cursor:pointer;
  font-weight:800;
}

.btn-primary{
  background:linear-gradient(135deg,#d8ad55,#ffbf6b);
  box-shadow:0 0 25px rgba(255,191,107,.3);
}

.btn:hover{
  transform:translateY(-3px);
}

/* 💎 CARDS */
.card{
  margin:40px;
  padding:30px;
  border-radius:25px;
  background:rgba(20,18,16,.6);
  backdrop-filter:blur(15px);
  border:1px solid var(--border);
  transition:.3s;
}

.card:hover{
  transform:translateY(-6px);
  box-shadow:0 30px 100px rgba(255,191,107,.2);
}

section{
  padding:80px 20px;
  text-align:center;
}

h2{
  font-size:40px;
  margin-bottom:20px;
}

/* 📱 form */
input,select,textarea{
  width:100%;
  margin:10px 0;
  padding:14px;
  border-radius:12px;
  border:1px solid var(--border);
  background:#111;
  color:white;
}

form{
  max-width:500px;
  margin:auto;
}
</style>
</head>

<body>

<section class="hero">
  <div class="hero-content">
    <h1>LAYLA NIGHTS</h1>
    <p class="subtitle">Afterparty exclusive · accès privé</p>
    <div class="date">03.05.2026</div>
    <br>
    <a href="#form"><button class="btn btn-primary">Accéder à l’expérience</button></a>
  </div>
</section>

<section>
  <h2>L’expérience</h2>
  <div class="card">
    Afro House · Deep House · énergie hypnotique · ambiance luxe
  </div>
</section>

<section>
  <h2>Accès</h2>

  <div class="card">
    <h3>Standard</h3>
    <p>300 DHS</p>
  </div>

  <div class="card">
    <h3>VIP</h3>
    <p>600 DHS</p>
  </div>
</section>

<section id="form">
  <h2>Demande d’accès</h2>

  <form>
    <input placeholder="Nom complet">
    <input placeholder="Téléphone">
    <input placeholder="Instagram">
    <select>
      <option>Standard</option>
      <option>VIP</option>
    </select>
    <textarea placeholder="Message"></textarea>

    <button class="btn btn-primary">Envoyer</button>
  </form>
</section>

</body>
</html>
