<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LAYLA NIGHTS</title>

<style>
body {
  font-family: Arial;
  background: black;
  color: white;
  text-align: center;
  padding: 40px;
}

input, select, textarea {
  width: 300px;
  padding: 12px;
  margin: 10px;
  border-radius: 10px;
  border: 1px solid gold;
  background: #111;
  color: white;
}

button {
  padding: 12px 20px;
  border-radius: 20px;
  border: none;
  background: gold;
  font-weight: bold;
  cursor: pointer;
}

#status {
  margin-top: 20px;
}
</style>
</head>

<body>

<h1>LAYLA NIGHTS</h1>

<form id="form">
  <input id="name" placeholder="Nom" required><br>
  <input id="phone" placeholder="Téléphone" required><br>
  <input id="instagram" placeholder="Instagram"><br>

  <select id="passType">
    <option value="standard">Standard</option>
    <option value="vip">VIP</option>
  </select><br>

  <textarea id="message" placeholder="Message"></textarea><br>

  <button type="submit">Envoyer</button>
</form>

<div id="status"></div>

<script>
document.getElementById("form").addEventListener("submit", async (e) => {
  e.preventDefault();

  const status = document.getElementById("status");
  status.innerText = "Envoi...";

  try {
    const res = await fetch("https://layla-nights-backend-1.onrender.com/api/request", {
      method: "POST",
      headers: {
        "Content-Type": "application/json"
      },
      body: JSON.stringify({
        fullName: name.value,
        phone: phone.value,
        instagram: instagram.value,
        passType: passType.value,
        message: message.value
      })
    });

    const data = await res.json();

    if (!res.ok) {
      status.innerText = "Erreur ❌";
      console.log(data);
      return;
    }

    status.innerText = "Envoyé ✅";
    form.reset();

  } catch (err) {
    console.error(err);
    status.innerText = "Erreur serveur ❌";
  }
});
</script>

</body>
</html>
